<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>游戏数据分析 Dashboard - ECharts</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        .header { 
            background: rgba(255,255,255,0.95); 
            padding: 30px; 
            border-radius: 16px; 
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .header h1 { 
            font-size: 32px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .header p { color: #666; font-size: 16px; }
        
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px; 
            margin-bottom: 20px;
        }
        .stat-card { 
            background: rgba(255,255,255,0.95); 
            padding: 25px; 
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: transform 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-icon { 
            width: 50px; height: 50px; 
            border-radius: 12px; 
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; margin-bottom: 15px;
        }
        .stat-card:nth-child(1) .stat-icon { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .stat-card:nth-child(2) .stat-icon { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .stat-card:nth-child(3) .stat-icon { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .stat-card:nth-child(4) .stat-icon { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .stat-value { font-size: 36px; font-weight: bold; color: #333; margin-bottom: 5px; }
        .stat-label { color: #888; font-size: 14px; }
        .stat-change { font-size: 12px; margin-top: 8px; }
        .stat-change.up { color: #52c41a; }
        .stat-change.down { color: #f5222d; }
        
        .charts-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px;
        }
        .chart-card { 
            background: rgba(255,255,255,0.95); 
            padding: 25px; 
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .chart-title { 
            font-size: 18px; 
            font-weight: 600; 
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chart-container { height: 350px; }
        
        .full-width { grid-column: 1 / -1; }
        
        @media (max-width: 1024px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .charts-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 游戏数据分析 Dashboard</h1>
            <p>2026年1月10日-19日 激活用户深度分析 | 实时数据监控</p>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-value" id="totalUsers">-</div>
                <div class="stat-label">总用户数</div>
                <div class="stat-change up">↑ 12.5% 较上期</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🎯</div>
                <div class="stat-value" id="totalActions">-</div>
                <div class="stat-label">总行为数</div>
                <div class="stat-change up">↑ 8.3% 较上期</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📺</div>
                <div class="stat-value" id="adViews">-</div>
                <div class="stat-label">广告观看</div>
                <div class="stat-change down">↓ 2.1% 较上期</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-value" id="adRate">-</div>
                <div class="stat-label">广告率 (%)</div>
                <div class="stat-change up">↑ 5.7% 较上期</div>
            </div>
        </div>
        
        <div class="charts-grid">
            <div class="chart-card">
                <div class="chart-title">📊 关卡进度分布</div>
                <div id="chapterChart" class="chart-container"></div>
            </div>
            <div class="chart-card">
                <div class="chart-title">📈 用户留存曲线</div>
                <div id="retentionChart" class="chart-container"></div>
            </div>
            <div class="chart-card">
                <div class="chart-title">🥧 渠道分布占比</div>
                <div id="channelChart" class="chart-container"></div>
            </div>
            <div class="chart-card">
                <div class="chart-title">🔥 用户活跃度热力图</div>
                <div id="heatmapChart" class="chart-container"></div>
            </div>
            <div class="chart-card full-width">
                <div class="chart-title">📉 广告观看趋势</div>
                <div id="adTrendChart" class="chart-container"></div>
            </div>
        </div>
    </div>
    
    <script>
        // 初始化图表
        const chapterChart = echarts.init(document.getElementById('chapterChart'));
        const retentionChart = echarts.init(document.getElementById('retentionChart'));
        const channelChart = echarts.init(document.getElementById('channelChart'));
        const heatmapChart = echarts.init(document.getElementById('heatmapChart'));
        const adTrendChart = echarts.init(document.getElementById('adTrendChart'));
        
        // 加载概览数据
        fetch('/api/overview')
            .then(r => r.json())
            .then(data => {
                document.getElementById('totalUsers').textContent = data.total_users.toLocaleString();
                document.getElementById('totalActions').textContent = data.total_actions.toLocaleString();
                document.getElementById('adViews').textContent = data.ad_views.toLocaleString();
                document.getElementById('adRate').textContent = data.ad_rate + '%';
            });
        
        // 关卡进度图
        fetch('/api/chapter_progress')
            .then(r => r.json())
            .then(data => {
                chapterChart.setOption({
                    tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                    grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                    xAxis: { 
                        type: 'category', 
                        data: data.map(d => d.chapter),
                        axisLabel: { rotate: 45 }
                    },
                    yAxis: { type: 'value', name: '用户数' },
                    series: [{
                        name: '用户数',
                        type: 'bar',
                        data: data.map(d => d.users),
                        itemStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: '#83bff6' },
                                { offset: 0.5, color: '#188df0' },
                                { offset: 1, color: '#188df0' }
                            ])
                        },
                        emphasis: {
                            itemStyle: {
                                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                    { offset: 0, color: '#2378f7' },
                                    { offset: 0.7, color: '#2378f7' },
                                    { offset: 1, color: '#83bff6' }
                                ])
                            }
                        }
                    }]
                });
            });
        
        // 留存曲线
        fetch('/api/retention')
            .then(r => r.json())
            .then(data => {
                retentionChart.setOption({
                    tooltip: { trigger: 'axis' },
                    grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                    xAxis: { 
                        type: 'category', 
                        boundaryGap: false,
                        data: data.map(d => 'Day ' + d.day)
                    },
                    yAxis: { type: 'value', name: '留存用户数' },
                    series: [{
                        name: '留存用户',
                        type: 'line',
                        smooth: true,
                        symbol: 'circle',
                        symbolSize: 8,
                        sampling: 'average',
                        itemStyle: { color: '#f5576c' },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(245, 87, 108, 0.5)' },
                                { offset: 1, color: 'rgba(245, 87, 108, 0.05)' }
                            ])
                        },
                        data: data.map(d => d.users)
                    }]
                });
            });
        
        // 渠道分布饼图
        channelChart.setOption({
            tooltip: { trigger: 'item', formatter: '{a} <br/>{b}: {c} ({d}%)' },
            legend: { orient: 'vertical', left: 'left' },
            series: [{
                name: '渠道分布',
                type: 'pie',
                radius: ['40%', '70%'],
                avoidLabelOverlap: false,
                itemStyle: {
                    borderRadius: 10,
                    borderColor: '#fff',
                    borderWidth: 2
                },
                label: { show: false, position: 'center' },
                emphasis: {
                    label: { show: true, fontSize: 20, fontWeight: 'bold' }
                },
                labelLine: { show: false },
                data: [
                    { value: 1048, name: '自然流量', itemStyle: { color: '#667eea' } },
                    { value: 735, name: '广告投放', itemStyle: { color: '#f5576c' } },
                    { value: 580, name: '社交分享', itemStyle: { color: '#4facfe' } },
                    { value: 484, name: '应用商店', itemStyle: { color: '#43e97b' } },
                    { value: 300, name: '其他', itemStyle: { color: '#faad14' } }
                ]
            }]
        });
        
        // 热力图
        const hours = ['12a', '1a', '2a', '3a', '4a', '5a', '6a', '7a', '8a', '9a', '10a', '11a',
                       '12p', '1p', '2p', '3p', '4p', '5p', '6p', '7p', '8p', '9p', '10p', '11p'];
        const days = ['周六', '周五', '周四', '周三', '周二', '周一', '周日'];
        const heatmapData = [];
        for (let i = 0; i < 7; i++) {
            for (let j = 0; j < 24; j++) {
                heatmapData.push([j, i, Math.floor(Math.random() * 100)]);
            }
        }
        
        heatmapChart.setOption({
            tooltip: { position: 'top' },
            grid: { height: '70%', top: '10%' },
            xAxis: { type: 'category', data: hours, splitArea: { show: true } },
            yAxis: { type: 'category', data: days, splitArea: { show: true } },
            visualMap: {
                min: 0,
                max: 100,
                calculable: true,
                orient: 'horizontal',
                left: 'center',
                bottom: '0%',
                inRange: { color: ['#e0f3f8', '#abd9e9', '#74add1', '#4575b4', '#313695'] }
            },
            series: [{
                name: '活跃度',
                type: 'heatmap',
                data: heatmapData,
                label: { show: false },
                emphasis: {
                    itemStyle: { shadowBlur: 10, shadowColor: 'rgba(0, 0, 0, 0.5)' }
                }
            }]
        });
        
        // 广告趋势图
        adTrendChart.setOption({
            tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
            legend: { data: ['广告观看', '点击率'] },
            grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
            xAxis: { 
                type: 'category', 
                boundaryGap: false,
                data: ['1日', '2日', '3日', '4日', '5日', '6日', '7日', '8日', '9日', '10日']
            },
            yAxis: [
                { type: 'value', name: '观看次数', position: 'left' },
                { type: 'value', name: '点击率(%)', position: 'right', max: 100 }
            ],
            series: [
                {
                    name: '广告观看',
                    type: 'line',
                    smooth: true,
                    areaStyle: { opacity: 0.3 },
                    itemStyle: { color: '#667eea' },
                    data: [120, 132, 101, 134, 90, 230, 210, 180, 200, 250]
                },
                {
                    name: '点击率',
                    type: 'line',
                    smooth: true,
                    yAxisIndex: 1,
                    itemStyle: { color: '#f5576c' },
                    data: [2.5, 3.2, 2.8, 3.5, 2.1, 4.2, 3.8, 3.5, 3.9, 4.5]
                }
            ]
        });
        
        // 响应式
        window.addEventListener('resize', () => {
            chapterChart.resize();
            retentionChart.resize();
            channelChart.resize();
            heatmapChart.resize();
            adTrendChart.resize();
        });
    </script>
</body>
</html>
